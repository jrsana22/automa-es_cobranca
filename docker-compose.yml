services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ~/credentials.json:/app/credentials.json
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/automacao.db}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-32bytes-encryption!}
      - GOOGLE_CREDENTIALS_PATH=/app/credentials.json
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-dev-only-nao-usar-em-producao}
    restart: unless-stopped

