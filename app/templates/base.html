<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Automação Cobrança{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block head %}{% endblock %}
</head>
<body>
<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">AC</div>
            <span class="sidebar-brand-text">Cobrança</span>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section-title">Principal</div>
            <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
                <span class="sidebar-link-icon">&#9632;</span>
                <span>Dashboard</span>
            </a>
            <a href="/automacoes/novo" class="sidebar-link {% if 'novo' in request.url.path %}active{% endif %}">
                <span class="sidebar-link-icon">&#43;</span>
                <span>Novo Cliente</span>
            </a>
            <a href="/logs" class="sidebar-link {% if request.url.path == '/logs' %}active{% endif %}">
                <span class="sidebar-link-icon">&#9776;</span>
                <span>Logs</span>
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<!-- Toast helper -->
<script>
function showToast(msg, type='info') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 4000);
}

function confirmAction(msg) {
    return confirm(msg);
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
