<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Automação Cobrança{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block head %}{% endblock %}
</head>
<body>
<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">AC</div>
            <span class="sidebar-brand-text">Cobrança</span>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section-title">Principal</div>
            <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
                <span class="sidebar-link-icon">&#9632;</span>
                <span>Dashboard</span>
            </a>
            <a href="/automacoes/novo" class="sidebar-link {% if 'novo' in request.url.path %}active{% endif %}">
                <span class="sidebar-link-icon">&#43;</span>
                <span>Novo Cliente</span>
            </a>
            <a href="/logs" class="sidebar-link {% if request.url.path == '/logs' %}active{% endif %}">
                <span class="sidebar-link-icon">&#9776;</span>
                <span>Logs</span>
            </a>
            <a href="/saude" class="sidebar-link {% if request.url.path == '/saude' %}active{% endif %}">
                <span class="sidebar-link-icon">&#10084;</span>
                <span>Saúde</span>
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<!-- Confirm modal -->
<div id="confirm-overlay" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
    <div style="background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:var(--space-8);min-width:320px;max-width:440px;width:90%;box-shadow:var(--shadow-lg);">
        <div id="confirm-msg" style="font-size:0.95rem;color:var(--text-primary);margin-bottom:var(--space-6);line-height:1.5;"></div>
        <div style="display:flex;justify-content:flex-end;gap:var(--space-3);">
            <button id="confirm-cancel" class="btn btn-ghost btn-sm">Cancelar</button>
            <button id="confirm-ok" class="btn btn-danger btn-sm">Confirmar</button>
        </div>
    </div>
</div>

<!-- Toast + Confirm helpers -->
<script>
function showToast(msg, type='info') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 4000);
}

function confirmAction(msg) {
    return new Promise(resolve => {
        const overlay = document.getElementById('confirm-overlay');
        document.getElementById('confirm-msg').textContent = msg;
        overlay.style.display = 'flex';

        function cleanup(result) {
            overlay.style.display = 'none';
            document.getElementById('confirm-ok').removeEventListener('click', onOk);
            document.getElementById('confirm-cancel').removeEventListener('click', onCancel);
            overlay.removeEventListener('click', onOutside);
            resolve(result);
        }
        const onOk = () => cleanup(true);
        const onCancel = () => cleanup(false);
        const onOutside = (e) => { if (e.target === overlay) cleanup(false); };

        document.getElementById('confirm-ok').addEventListener('click', onOk);
        document.getElementById('confirm-cancel').addEventListener('click', onCancel);
        overlay.addEventListener('click', onOutside);
    });
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
